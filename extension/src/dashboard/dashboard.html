<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenVault Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050505; 
      color: #A1A1AA; 
      min-height: 100vh; 
      overflow-x: hidden;
    }
    h1, h2, h3, h4, h5, h6 { color: #ffffff; }
    
    /* Ambient Glow from Landing Page */
    .bg-radial-glow {
      position: fixed; top: 0; left: 0; width: 100%; height: 800px;
      background: radial-gradient(circle at 50% 0%, rgba(120, 119, 198, 0.15), transparent 50%);
      pointer-events: none; z-index: -1; opacity: 0.6;
    }

    /* Premium Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
  </style>
</head>
<body>
  <div class="bg-radial-glow"></div>
  <div id="root"></div>
  <script type="module" src="dashboard/index.js"></script>
</body>
</html>
