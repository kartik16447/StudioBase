<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScreenVault | Video Player</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: { brand: "#ef4444" }, // ScreenVault Red
          },
        },
      };
    </script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
      /* Custom styles to hide/show elements smoothly */
      #player {
        display: none;
        opacity: 0;
        transition: opacity 0.5s ease-in-out;
      }
      #player.loaded {
        display: block;
        opacity: 1;
      }

      /* Premium video container shadow */
      .video-shadow {
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.25),
          0 0 0 1px rgba(0, 0, 0, 0.05);
      }

      /* Spinner animation */
      .spinner {
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex flex-col text-gray-800 antialiased"
  >
    <nav
      class="w-full bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm z-10"
    >
      <div class="flex items-center gap-2">
        <div
          class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center text-white font-bold text-lg shadow-md"
        >
          <i class="ph ph-video-camera"></i>
        </div>
        <span class="font-bold text-xl tracking-tight text-gray-900"
          >ScreenVault</span
        >
      </div>
      <div>
        <button
          class="text-sm font-medium bg-gray-900 text-white px-4 py-2 rounded-md transition-colors hover:bg-gray-800 shadow-sm ml-2"
        >
          Get the Extension
        </button>
      </div>
    </nav>

    <main
      class="flex-grow flex flex-col items-center pt-10 pb-20 px-4 sm:px-6 lg:px-8 w-full max-w-6xl mx-auto"
    >
      <div
        class="w-full max-w-5xl mb-6 flex flex-col sm:flex-row sm:items-end justify-between gap-4"
      >
        <div>
          <h1
            id="video-title"
            class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2"
          >
            Loading title...
          </h1>
          <p class="text-sm text-gray-500 flex items-center gap-2">
            <i class="ph ph-calendar-blank"></i>
            <span id="date-display">Just now</span>
          </p>
        </div>
        <div class="flex gap-3">
          <button
            onclick="copyLink()"
            class="flex items-center gap-2 bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium hover:bg-gray-50 transition-colors shadow-sm text-sm"
          >
            <i class="ph ph-link text-lg"></i>
            Copy Link
          </button>
        </div>
      </div>

      <div
        id="error-state"
        class="hidden flex flex-col items-center justify-center text-center max-w-md w-full mx-auto my-12"
      >
        <div
          class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-6 border border-red-100"
        >
          <i class="ph ph-video-camera-slash text-3xl text-red-500"></i>
        </div>
        <h2 id="error-title" class="text-2xl font-bold text-gray-900 mb-2">
          Video Not Found
        </h2>
        <p id="error-desc" class="text-gray-500 text-sm leading-relaxed mb-8">
          The link might be broken, or the creator may have deleted this
          recording.
        </p>
        <button
          onclick="window.location.reload()"
          class="px-6 py-3 bg-gray-900 text-white font-medium rounded-lg hover:bg-gray-800 transition-colors shadow-sm"
        >
          Try Refreshing
        </button>
      </div>

      <div
        id="video-wrapper"
        class="w-full max-w-5xl bg-black rounded-2xl overflow-hidden video-shadow relative aspect-video flex items-center justify-center group hidden"
      >
        <div
          id="loader"
          class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-10 transition-opacity duration-300"
          style="display:none"
        >
          <div class="spinner mb-4"></div>
          <p class="text-gray-400 font-medium text-sm animate-pulse">Preparing your video...</p>
        </div>

        <video
          id="player"
          class="w-full h-full object-contain outline-none bg-black"
          autoplay
          muted
          playsinline
          crossorigin="anonymous"
          controlsList="nodownload"
          disablePictureInPicture
        ></video>

        <!-- Big Center Play Button (Hover Only) -->
        <button id="center-play-btn" class="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20">
          <div class="w-20 h-20 bg-brand/90 backdrop-blur-md rounded-full flex items-center justify-center text-white shadow-2xl transform scale-90 group-hover:scale-100 transition-transform">
            <i id="center-play-icon" class="ph-fill ph-play text-4xl ml-1"></i>
          </div>
        </button>

        <!-- Custom Control Bar -->
        <div id="controls-bar" class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent p-4 pt-12 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col gap-3 z-30 pointer-events-none group-hover:pointer-events-auto">
          <!-- Progress Bar -->
          <div class="relative w-full h-1.5 bg-white/20 rounded-full cursor-pointer group/progress mb-1">
             <div id="progress-fill" class="absolute top-0 left-0 h-full bg-brand rounded-full" style="width: 0%"></div>
             <div id="seek-hover" class="absolute top-0 h-full bg-white/10 hidden pointer-events-none"></div>
             <input id="seek-slider" type="range" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" min="0" max="1000" value="0">
          </div>
          
          <div class="flex items-center justify-between text-white">
             <div class="flex items-center gap-5">
                <!-- Play/Pause -->
                <button id="play-pause-btn" class="hover:scale-110 transition-transform focus:outline-none">
                   <i id="play-icon" class="ph-fill ph-play text-2xl"></i>
                </button>
                
                <!-- Skip Buttons -->
                <div class="flex items-center gap-4">
                  <button id="skip-back-btn" class="hover:text-brand transition-colors focus:outline-none flex flex-col items-center">
                     <i class="ph ph-rewind-15 text-2xl"></i>
                  </button>
                  <button id="skip-forward-btn" class="hover:text-brand transition-colors focus:outline-none flex flex-col items-center">
                     <i class="ph ph-fast-forward-15 text-2xl"></i>
                  </button>
                </div>
                
                <!-- Time -->
                <div id="time-text" class="text-xs font-mono font-medium tracking-tight">0:00 / 0:00</div>
             </div>
             
             <div class="flex items-center gap-5">
                <!-- Speed -->
                <div id="speed-btn" class="text-[10px] font-black bg-white/10 hover:bg-white/20 px-2.5 py-1 rounded-full cursor-pointer transition-colors border border-white/5 uppercase tracking-widest">1x</div>

                <!-- Volume -->
                <div class="flex items-center gap-2 group/volume relative">
                   <button id="volume-btn" class="focus:outline-none hover:scale-110 transition-transform">
                     <i id="volume-icon" class="ph-fill ph-speaker-high text-xl"></i>
                   </button>
                   <div class="w-0 overflow-hidden group-hover/volume:w-20 transition-all duration-300 flex items-center">
                      <input id="volume-slider" type="range" class="w-20 accent-brand cursor-pointer h-1" min="0" max="1" step="0.05" value="1">
                   </div>
                </div>

                <!-- Fullscreen -->
                <button id="fullscreen-btn" class="hover:scale-110 transition-transform focus:outline-none">
                  <i id="fullscreen-icon" class="ph ph-arrows-out text-xl"></i>
                </button>
             </div>
          </div>
        </div>
      </div>

      <div
        class="w-full max-w-5xl mt-8 flex items-center justify-between border-t border-gray-200 pt-6"
      >
        <div class="flex gap-2">
          <button
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-xl shadow-sm hover:scale-105 transition-transform hover:bg-gray-50"
          >
            👍
          </button>
          <button
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-xl shadow-sm hover:scale-105 transition-transform hover:bg-gray-50"
          >
            ❤️
          </button>
          <button
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-xl shadow-sm hover:scale-105 transition-transform hover:bg-gray-50"
          >
            🎉
          </button>
        </div>
        <div class="text-sm text-gray-500 font-medium">0 Views</div>
      </div>
    </main>

    <div
      id="toast"
      class="fixed bottom-5 right-5 transform translate-y-24 opacity-0 transition-all duration-300 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-xl font-medium flex items-center gap-2 z-50"
    >
      <i id="toast-icon" class="ph ph-check-circle text-green-400 text-lg"></i>
      <span id="toast-msg">Link copied to clipboard!</span>
    </div>

    <script src="playback.js"></script>
    <script>
      // Set today's date dynamically
      document.getElementById("date-display").textContent =
        new Date().toLocaleDateString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
        });

      // 10 Random Delightful Messages
      const delightMessages = [
        "Hooray! You just saved a meeting. 🎉",
        "Boom! Knowledge shared instantly. 🚀",
        "Another meeting avoided. You're welcome. 🙌",
        "Async communication FTW! ⚡",
        "Time saved. Context delivered. 🧠",
        "Look at you, communicating like a pro. 🎬",
        "One video, zero scheduling conflicts. 🗓️",
        "They're going to love this update. 💡",
        "Crystal clear communication delivered. 💎",
        "That's a wrap! Ready to watch. 🍿",
      ];

      // Dynamic Toast Function
      function showToast(
        message,
        iconClass = "ph-check-circle",
        colorClass = "text-green-400",
      ) {
        const toast = document.getElementById("toast");
        document.getElementById("toast-msg").textContent = message;

        const iconEl = document.getElementById("toast-icon");
        iconEl.className = `ph ${iconClass} ${colorClass} text-lg`;

        toast.classList.remove("translate-y-24", "opacity-0");
        setTimeout(() => {
          toast.classList.add("translate-y-24", "opacity-0");
        }, 1000); // 1 second for snappier feedback
      }

      function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
          showToast("Link copied to clipboard!", "ph-link", "text-blue-400");
        });
      }

      // Error handling UI toggle
      function showError(title, description) {
        document.getElementById("video-wrapper").classList.add("hidden");
        const errState = document.getElementById("error-state");
        errState.classList.remove("hidden");
        document.getElementById("error-title").textContent = title;
        document.getElementById("error-desc").textContent = description;
      }

      document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get("id");
        const urlTitle = params.get("title");
        const videoWrapper = document.getElementById("video-wrapper");
        const video = document.getElementById("player");
        const loader = document.getElementById("loader");

        // Custom UI Elements
        const playPauseBtn = document.getElementById("play-pause-btn");
        const playIcon = document.getElementById("play-icon");
        const centerPlayBtn = document.getElementById("center-play-btn");
        const centerPlayIcon = document.getElementById("center-play-icon");
        const skipBackBtn = document.getElementById("skip-back-btn");
        const skipForwardBtn = document.getElementById("skip-forward-btn");
        const seekSlider = document.getElementById("seek-slider");
        const progressFill = document.getElementById("progress-fill");
        const timeText = document.getElementById("time-text");
        const volumeBtn = document.getElementById("volume-btn");
        const volumeIcon = document.getElementById("volume-icon");
        const volumeSlider = document.getElementById("volume-slider");
        const speedBtn = document.getElementById("speed-btn");
        const fullscreenBtn = document.getElementById("fullscreen-btn");
        const fullscreenIcon = document.getElementById("fullscreen-icon");

        let hasUserPlayed = false;
        let previewLoopActive = true;
        let authoritativeDurationMs = 0;

        const sessionId = params.get("sid") || crypto.randomUUID?.() || Math.random().toString(36).substring(2);

        if (!fileId) {
          showError("Invalid Link", "We couldn't find a video ID in this URL.");
          return;
        }

        const titleEl = document.getElementById("video-title");

        function formatTime(ms) {
          if (ms === null || ms === undefined || isNaN(ms) || !isFinite(ms)) return "0:00";
          const totalSeconds = Math.max(0, Math.floor(ms / 1000));
          const mins = Math.floor(totalSeconds / 60);
          const secs = totalSeconds % 60;
          return `${mins}:${secs.toString().padStart(2, "0")}`;
        }

        function updateUI() {
          // Progress Fill
          let totalMs = authoritativeDurationMs;
          if (!totalMs && video.duration && isFinite(video.duration)) {
            totalMs = Math.floor(video.duration * 1000);
          }

          if (totalMs > 0) {
            const currentMs = video.currentTime * 1000;
            const progress = (currentMs / totalMs) * 100;
            progressFill.style.width = `${Math.min(100, progress)}%`;
            seekSlider.value = Math.min(1000, (currentMs / totalMs) * 1000);
            timeText.textContent = `${formatTime(currentMs)} / ${formatTime(totalMs)}`;
          }

          // Play/Pause Icons
          if (video.paused || previewLoopActive) {
            playIcon.className = "ph-fill ph-play text-2xl";
            centerPlayIcon.className = "ph-fill ph-play text-4xl ml-1";
            if (!previewLoopActive) videoWrapper.classList.add("paused");
          } else {
            playIcon.className = "ph-fill ph-pause text-2xl";
            centerPlayIcon.className = "ph-fill ph-pause text-4xl";
            videoWrapper.classList.remove("paused");
          }
        }

        function togglePlay() {
          if (!hasUserPlayed) {
            hasUserPlayed = true;
            previewLoopActive = false;
            videoWrapper.classList.remove("preview");
            video.muted = false;
            video.currentTime = 0;
            updateVolumeIcon();
            video.play();
            updateUI();
            return;
          }

          if (video.paused) {
            video.play();
          } else {
            video.pause();
          }
          updateUI();
        }

        function updateVolumeIcon() {
          if (video.muted || video.volume === 0) {
            volumeIcon.className = "ph-fill ph-speaker-simple-x text-xl";
          } else if (video.volume <= 0.5) {
            volumeIcon.className = "ph-fill ph-speaker-simple-low text-xl";
          } else {
            volumeIcon.className = "ph-fill ph-speaker-simple-high text-xl";
          }
        }

        async function initPlayer() {
          try {
            if (urlTitle) titleEl.textContent = decodeURIComponent(urlTitle);
            videoWrapper.classList.remove("hidden");

            // 1. Fetch Metadata
            let metaUrl = `https://screenvault-proxy.karthik-upadhyay98.workers.dev/meta?id=${fileId}&sid=${sessionId}`;
            const metaRes = await fetch(metaUrl).catch(() => null);
            if (metaRes && metaRes.ok) {
              const data = await metaRes.json();
              if (data.name) titleEl.textContent = data.name.replace(".webm", "");
              if (data.actualDurationMs) authoritativeDurationMs = data.actualDurationMs;
            }

            // 2. Start Video (Muted Preview)
            let streamUrl;
            if (window.SV && typeof window.SV.getPlayableUrl === "function") {
              streamUrl = await window.SV.getPlayableUrl(fileId, sessionId);
            } else {
              streamUrl = `https://screenvault-proxy.karthik-upadhyay98.workers.dev/?id=${fileId}&sid=${sessionId}`;
            }
            video.src = streamUrl;
            video.load();

            // Only show loader if video takes >500ms — avoids flash on fast connections
            const loaderTimer = setTimeout(() => {
              loader.style.display = "flex";
            }, 500);
            video.addEventListener("canplay", () => clearTimeout(loaderTimer), { once: true });

            video.muted = true;
            video.play().catch(() => {});

          } catch (e) {
            showError("Connection Failed", "We couldn't connect to the stream.");
          }
        }

        // Control Listeners
        playPauseBtn.addEventListener("click", togglePlay);
        centerPlayBtn.addEventListener("click", togglePlay);
        
        skipBackBtn.addEventListener("click", () => {
          video.currentTime = Math.max(0, video.currentTime - 15);
          updateUI();
        });

        skipForwardBtn.addEventListener("click", () => {
          let totalSec = authoritativeDurationMs / 1000;
          if (!totalSec && video.duration && isFinite(video.duration)) totalSec = video.duration;
          video.currentTime = Math.min(totalSec || video.currentTime + 15, video.currentTime + 15);
          updateUI();
        });

        seekSlider.addEventListener("input", () => {
          let totalMs = authoritativeDurationMs;
          if (!totalMs && video.duration && isFinite(video.duration)) totalMs = video.duration * 1000;
          if (totalMs > 0) {
            video.currentTime = (seekSlider.value / 1000) * (totalMs / 1000);
            updateUI();
          }
        });

        volumeBtn.addEventListener("click", () => {
          video.muted = !video.muted;
          updateVolumeIcon();
        });

        volumeSlider.addEventListener("input", () => {
          video.volume = volumeSlider.value;
          video.muted = video.volume === 0;
          updateVolumeIcon();
        });

        const speeds = [1, 1.25, 1.5, 2];
        let speedIdx = 0;
        speedBtn.addEventListener("click", () => {
          speedIdx = (speedIdx + 1) % speeds.length;
          video.playbackRate = speeds[speedIdx];
          speedBtn.textContent = speeds[speedIdx] + "x";
        });

        fullscreenBtn.addEventListener("click", () => {
          if (!document.fullscreenElement) {
            videoWrapper.requestFullscreen?.();
          } else {
            document.exitFullscreen?.();
          }
        });

        document.addEventListener("fullscreenchange", () => {
          fullscreenIcon.className = document.fullscreenElement
            ? "ph ph-arrows-in text-xl"
            : "ph ph-arrows-out text-xl";
        });

        // Keyboard Shortcuts
        window.addEventListener("keydown", (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

          switch(e.key.toLowerCase()) {
            case " ":
            case "k":
              e.preventDefault();
              togglePlay();
              break;
            case "m":
              video.muted = !video.muted;
              updateVolumeIcon();
              break;
            case "f":
              if (!document.fullscreenElement) {
                videoWrapper.requestFullscreen?.();
              } else {
                document.exitFullscreen?.();
              }
              break;
            case "arrowleft":
              video.currentTime = Math.max(0, video.currentTime - 15);
              updateUI();
              break;
            case "arrowright":
              let totalSec = authoritativeDurationMs / 1000;
              if (!totalSec && video.duration && isFinite(video.duration)) totalSec = video.duration;
              video.currentTime = Math.min(totalSec || video.currentTime + 15, video.currentTime + 15);
              updateUI();
              break;
          }
        });

        // Loop Logic & UI Sync
        video.addEventListener("timeupdate", () => {
          if (previewLoopActive && video.currentTime >= 4) {
            video.currentTime = 0;
          }
          updateUI();
        });

        video.addEventListener("play", updateUI);
        video.addEventListener("pause", updateUI);
        video.addEventListener("volumechange", updateVolumeIcon);

        video.addEventListener("canplay", () => {
          loader.style.opacity = "0";
          setTimeout(() => (loader.style.display = "none"), 300);
          video.classList.add("loaded");
          videoWrapper.classList.add("preview");
          updateUI();
          showToast(delightMessages[Math.floor(Math.random() * delightMessages.length)], "ph-lightning", "text-yellow-400");
        }, { once: true });

        let retryCount = 0;
        video.addEventListener("error", () => {
          if (retryCount < 2) {
            retryCount++;
            setTimeout(() => { video.load(); }, 1000);
            return;
          }
          fetch('https://screenvault-proxy.karthik-upadhyay98.workers.dev/event', {
            method: 'POST',
            body: JSON.stringify({ type: 'browser_video_error', sessionId, metadata: { code: video.error?.code } })
          }).catch(() => {});
          showError("Playback Error", "We encountered an issue streaming this video. Please try refreshing.");
        });

        initPlayer();
      });
    </script>
    <style>
      /* Ensure controls are always visible when paused */
      #video-wrapper.paused #controls-bar {
        opacity: 1;
        pointer-events: auto;
      }

      /* Auto-hide loader the instant video gets .loaded — no JS timing needed */
      #video-wrapper:has(#player.loaded) #loader {
        display: none;
      }

      /* Preview loop mode: GIF-like, only play button visible */
      #video-wrapper.preview #controls-bar {
        display: none !important;
      }
      #video-wrapper.preview #center-play-btn {
        background: transparent;
        pointer-events: auto;
      }
      #video-wrapper.preview #center-play-btn > div {
        transform: scale(1);
      }
      
      /* Progress slider styling */
      #seek-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        background: white;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
      }
      
      #volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 10px;
        height: 10px;
        background: white;
        border-radius: 50%;
        cursor: pointer;
      }

      .ph-fill {
        font-family: "Phosphor-Fill" !important;
      }
    </style>
  </body>
</html>
