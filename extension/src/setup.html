<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ScreenVault Setup</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #141414;
        color: white;
        margin: 0;
      }
      .box {
        text-align: center;
        padding: 40px;
        background: #1e1e1e;
        border-radius: 12px;
        border: 1px solid #333;
        max-width: 400px;
      }
      button {
        background: #ff6b4a;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 24px;
        transition: background 0.2s;
      }
      button:hover {
        background: #ff856b;
      }
      p {
        color: #aaa;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Microphone Access Required</h2>
      <p>
        ScreenVault needs your permission to record audio alongside your screen.
        You only need to do this once.
      </p>
      <button id="btn-allow">Allow Microphone</button>
    </div>
    <script src="setup.js"></script>
  </body>
</html>
