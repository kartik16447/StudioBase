<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioBase | IDB Memory Soak-Test</title>
    <style>
        body { font-family: system-ui; background: #0f172a; color: #f8fafc; padding: 2rem; margin: 0; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; }
        .card h3 { margin: 0 0 0.5rem 0; font-size: 0.875rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .card .value { font-size: 1.5rem; font-weight: 700; font-family: monospace; }
        .card .unit { font-size: 0.875rem; color: #64748b; margin-left: 0.25rem; }
        .controls { display: flex; gap: 1rem; margin-bottom: 2rem; background: #1e293b; padding: 1.5rem; border-radius: 0.75rem; }
        button { padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-start { background: #3b82f6; color: white; }
        .btn-stop { background: #ef4444; color: white; }
        .btn-clear { background: #64748b; color: white; }
        select { background: #334155; color: white; border: 1px solid #475569; padding: 0.5rem; border-radius: 0.25rem; }
        #logs { background: #000; padding: 1rem; border-radius: 0.5rem; font-family: monospace; height: 300px; overflow-y: auto; font-size: 0.75rem; line-height: 1.5; color: #10b981; }
        .progress-container { width: 100%; background: #334155; height: 4px; border-radius: 2px; margin-top: 1rem; overflow: hidden; }
        #progress-bar { height: 100%; background: #3b82f6; width: 0%; transition: 0.1s; }
    </style>
</head>
<body>
    <h1>IDB Durability & Memory Soak-Test</h1>
    <p style="color: #94a3b8; margin-bottom: 2rem;">Simulates MediaRecorder dataavailable streaming to IndexedDB</p>

    <div class="controls">
        <div>
            <label>Mode:</label>
            <select id="mode">
                <option value="1080p">1080p (5MB chunks @ 5s)</option>
                <option value="4k">4K (15MB chunks @ 5s)</option>
                <option value="ultrawide">Ultrawide (25MB chunks @ 5s)</option>
                <option value="stress">STRESS (10MB chunks @ 1s)</option>
            </select>
        </div>
        <button class="btn-start" id="start-btn">Start Soak Test</button>
        <button class="btn-stop" id="stop-btn">Stop</button>
        <button class="btn-clear" id="clear-btn">Wipe IDB</button>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Chunks Persisted</h3>
            <div class="value" id="v-chunks">0</div>
        </div>
        <div class="card">
            <h3>Total Data</h3>
            <div class="value" id="v-data">0</div><span class="unit">MB</span>
        </div>
        <div class="card">
            <h3>Avg Latency</h3>
            <div class="value" id="v-latency">0</div><span class="unit">ms</span>
        </div>
        <div class="card">
            <h3>p95 Latency</h3>
            <div class="value" id="v-p95">0</div><span class="unit">ms</span>
        </div>
        <div class="card">
            <h3>Heap Usage</h3>
            <div class="value" id="v-heap">0</div><span class="unit">MB</span>
        </div>
        <div class="card">
            <h3>Pending Writes</h3>
            <div class="value" id="v-pending">0</div>
        </div>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="logs">
        [SYSTEM] Waiting for initialization...<br>
    </div>

    <script src="idb-memory-soak.js"></script>
</body>
</html>
